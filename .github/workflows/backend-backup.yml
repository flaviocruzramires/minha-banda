name: Daily Postgres Backup

# Backup diário do Neon às 06:00 UTC (03:00 Brasília).
# Artefato retido 30 dias no GitHub (free tier).
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  backup:
    name: pg_dump → GitHub Artifact
    runs-on: ubuntu-latest
    steps:
      - name: Dump Neon Postgres
        env:
          DATABASE_URL: ${{ secrets.NEON_DATABASE_URL_DIRECT }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Secret NEON_DATABASE_URL_DIRECT não configurado — pulando backup." >&2
            exit 1
          fi
          FILENAME="minha_banda_$(date +%Y%m%d_%H%M%S).dump"
          docker run --rm \
            -e PGSSLMODE=require \
            -v /tmp:/backup \
            postgres:16 \
            pg_dump "$DATABASE_URL" --no-owner --no-privileges -F c -f "/backup/$FILENAME"
          echo "BACKUP_FILE=$FILENAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_id }}
          path: /tmp/${{ env.BACKUP_FILE }}
          retention-days: 30
