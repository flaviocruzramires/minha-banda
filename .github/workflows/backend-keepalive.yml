name: Backend Keep-Alive

# Pinga o endpoint de health a cada 4 minutos para evitar que o Render (suspend
# após 15 min) e o Neon (suspend após 5 min) entrem em cold-start.
on:
  schedule:
    - cron: '*/4 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping health endpoint
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health/
        run: |
          curl -sS -o /dev/null -w "HTTP %{http_code}\n" \
            ${{ secrets.RENDER_HEALTH_URL }} \
            --max-time 20 --retry 2 --retry-delay 5
