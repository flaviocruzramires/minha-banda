name: minha_banda_flutter
description: App de gestão de bandas — agenda, repertório, eventos, teleprompter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2
  equatable: ^2.0.7
  cupertino_icons: ^1.0.8
  http: ^1.2.2
  shared_preferences: ^2.3.4
  wakelock_plus: ^1.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
